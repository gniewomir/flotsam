<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flotsam Settings</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        line-height: 1.5;
        padding: 24px;
        max-width: 760px;
      }

      h1 {
        margin-top: 0;
      }

      .card {
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        border-radius: 10px;
        padding: 16px;
        margin-top: 16px;
      }

      .card h2 {
        margin-top: 0;
        font-size: 1.2rem;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
      }

      label[for="new-domain"] {
        margin-top: 12px;
      }

      input[type="number"] {
        font-size: 1rem;
        padding: 6px 8px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        width: 80px;
      }

      .domain-list {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
      }

      .domain-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid
          color-mix(in srgb, currentColor 8%, transparent);
      }

      .domain-list li:last-child {
        border-bottom: none;
      }

      .remove-btn {
        background: none;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        color: inherit;
        cursor: pointer;
        padding: 2px 10px;
        font-size: 0.85rem;
        opacity: 0.7;
      }

      .remove-btn:hover {
        opacity: 1;
      }

      .remove-btn:focus-visible {
        outline: 2px solid color-mix(in srgb, currentColor 50%, transparent);
        outline-offset: 2px;
        opacity: 1;
      }

      .empty-state {
        opacity: 0.5;
        font-style: italic;
        margin: 8px 0 0;
      }

      .add-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .add-row input[type="text"] {
        flex: 1;
        font-size: 1rem;
        padding: 6px 8px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }

      .add-btn {
        font-size: 0.9rem;
        padding: 6px 14px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .add-btn:hover {
        background: color-mix(in srgb, currentColor 8%, transparent);
      }

      .add-btn:focus-visible {
        outline: 2px solid color-mix(in srgb, currentColor 50%, transparent);
        outline-offset: 2px;
      }

      .status {
        font-size: 0.85rem;
        margin-top: 6px;
        min-height: 1.3em;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>Flotsam Settings</h1>

    <div class="card">
      <h2>Auto-close timeout</h2>
      <label for="timeout">Close tabs after (minutes)</label>
      <input type="number" id="timeout" min="1" max="1440" step="1" />
      <div class="status" id="timeout-status"></div>
    </div>

    <div class="card">
      <h2>Excluded domains</h2>
      <p>Tabs on these domains will never be auto-closed.</p>
      <ul class="domain-list" id="domain-list"></ul>
      <label for="new-domain">Domain to exclude</label>
      <div class="add-row">
        <input type="text" id="new-domain" placeholder="example.com" />
        <button class="add-btn" id="add-domain-btn">Add</button>
      </div>
    </div>

    <p style="margin-top: 24px; opacity: 0.5; font-size: 0.85rem">
      <a href="about.html" style="color: inherit">About Flotsam</a>
    </p>

    <script src="options.js"></script>
  </body>
</html>
